<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Vertical Infinity</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --v-blue: #00aff0; --bg: #fdfdfd; --border: #e0e7ed; }
        body, html { margin: 0; padding: 0; height: 100dvh; width: 100%; background: var(--bg); font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        #auth-screen { position: fixed; inset: 0; background: #fff; z-index: 5000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .auth-card { width: 85%; max-width: 350px; }
        .v-logo-big { font-size: 42px; font-weight: bold; color: var(--v-blue); margin-bottom: 30px; }
        
        .app-wrap { display: flex; flex: 1; height: 100%; width: 100%; overflow: hidden; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #fff; height: 100%; }
        .chat-header { padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        
        #video-overlay { position: absolute; top: 60px; right: 15px; width: 140px; aspect-ratio: 4/3; background: #000; border-radius: 10px; z-index: 100; border: 2px solid var(--v-blue); display: none; overflow: hidden; }
        #video-overlay.fullscreen { position: fixed; inset: 0; width: 100vw; height: 100dvh; border: none; border-radius: 0; top: 0; right: 0; z-index: 500; }

        .messages { flex: 1; padding: 15px; overflow-y: auto; background: #f9fbfd; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 15px; }
        .in { align-self: flex-start; background: #fff; border: 1px solid var(--border); }
        .out { align-self: flex-end; background: var(--v-blue); color: #fff; }

        .input-bar { padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: #fff; }
        .m-input { flex: 1; background: #f1f4f6; border: 1px solid var(--border); border-radius: 20px; padding: 10px 15px; outline: none; font-size: 16px; }
        .h-btn { font-size: 20px; color: var(--v-blue); cursor: pointer; padding: 5px; }
        .btn-main { width: 100%; background: var(--v-blue); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="v-logo-big">V Vertical</div>
            <div id="auth-form">
                <input type="text" id="user-nick" class="m-input" placeholder="Ник" style="width:100%; margin-bottom:15px; box-sizing:border-box;">
                <input type="email" id="user-email" class="m-input" placeholder="Email" style="width:100%; margin-bottom:20px; box-sizing:border-box;">
                <button class="btn-main" onclick="processAuth()">ВОЙТИ</button>
            </div>
            <div id="auth-status" style="display:none;">
                <h2 style="color:var(--v-blue)">ИНФОРМАЦИЯ ОДОБРЕНА</h2>
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size:30px; color:var(--v-blue); margin-top:15px;"></i>
            </div>
        </div>
    </div>

    <div class="app-wrap">
        <div class="chat-area">
            <div class="chat-header">
                <div><b id="chat-title">Vertical Infinity</b><br><small style="color:green">● онлайн</small></div>
                <div style="display:flex; gap:12px;">
                    <i class="fa-solid fa-video h-btn" onclick="startVideo()"></i>
                    <i class="fa-solid fa-phone h-btn" onclick="playSfx('call')"></i>
                    <i class="fa-solid fa-xmark h-btn" style="color:red" onclick="location.href='feed.html'"></i>
                </div>
            </div>
            <div id="video-overlay" onclick="this.classList.toggle('fullscreen')">
                <video id="v-stream" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            </div>
            <div class="messages" id="box"></div>
            <div class="input-bar">
                <i class="fa-solid fa-paperclip h-btn"></i>
                <input type="text" id="msg" class="m-input" placeholder="Сообщение...">
                <i class="fa-solid fa-paper-plane h-btn" onclick="send()"></i>
            </div>
        </div>
    </div>

<script>
    const sfx = {
        msg: new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3'),
        call: new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3')
    };

    function playSfx(type) { sfx[type].play().catch(()=>{}); }

    // Проверка сохраненного пользователя
    window.onload = () => {
        const savedNick = localStorage.getItem('v-nick');
        if(savedNick) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-title').innerText = "Vertical: " + savedNick;
        }
    };

    function processAuth() {
        const nick = document.getElementById('user-nick').value;
        const email = document.getElementById('user-email').value;
        if(!nick || !email) return alert("Заполните поля");

        localStorage.setItem('v-nick', nick);
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('auth-status').style.display = 'block';

        setTimeout(() => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-title').innerText = "Vertical: " + nick;
        }, 1500);
    }

    function send() {
        const m = document.getElementById('msg');
        if(!m.value) return;
        playSfx('msg');
        document.getElementById('box').innerHTML += '<div class="bubble out">' + m.value + '</div>';
        m.value = '';
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }

    function startVideo() {
        const vo = document.getElementById('video-overlay');
        vo.style.display = (vo.style.display === 'none' || !vo.style.display) ? 'block' : 'none';
        if(vo.style.display === 'block') {
            navigator.mediaDevices.getUserMedia({video:true}).then(s => {
                document.getElementById('v-stream').srcObject = s;
            });
        }
    }

    window.visualViewport.addEventListener('resize', () => {
        document.body.style.height = window.visualViewport.height + 'px';
    });
</script>
</body>
</html>
