<body>
<div id="login">
    <div style="font-size: 60px; margin-bottom: 20px;">👤</div>
    <h1 style="margin: 0 0 10px 0;">Vertical Pro</h1>
    <input type="text" id="my-nick" class="ios-input" placeholder="Ваш никнейм">
    <button onclick="connectCloud()" class="ios-input" style="background:var(--ios-blue); border:none; font-weight:bold;">ВОЙТИ</button>
</div>
<div class="main-screen">
    <div class="dynamic-island">
        <div class="search-box">
            <div id="status-dot" class="dot"></div>
            <input type="text" id="target-nick" placeholder="Ник друга..." oninput="checkFriendStatus()">
            <button class="btn-ios btn-call" onclick="makeCall()"><i class="fa-solid fa-phone"></i></button>
        </div>
    </div>
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>
    <div id="chat-messages"></div>
    <div class="bottom-nav">
        <div class="controls-row">
            <button class="btn-ios" onclick="toggleMic(this)"><i class="fa-solid fa-microphone"></i></button>
            <button class="btn-ios btn-hangup" onclick="location.reload()"><i class="fa-solid fa-phone-slash"></i></button>
            <button class="btn-ios" onclick="toggleCam(this)"><i class="fa-solid fa-video"></i></button>
        </div>
        <div class="chat-row">
            <input type="text" id="text-msg" placeholder="Сообщение..." onkeypress="if(event.keyCode==13) sendText()">
            <i class="fa-solid fa-paper-plane" onclick="sendText()" style="color:var(--ios-blue); font-size: 20px;"></i>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBbHZH3dHhSQ_uslmBhxLC4HqBZHUBKl5g",
        authDomain: "verticalchat-69a8f.firebaseapp.com",
        databaseURL: "https://verticalchat-69a8f-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "verticalchat-69a8f",
        storageBucket: "verticalchat-69a8f.firebasestorage.app",
        messagingSenderId: "372527972623",
        appId: "1:372527972623:web:5eec4cfe62586637b37e7a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myNick = "", localStream, peer, activeChat = null;
    async function connectCloud() {
        myNick = document.getElementById('my-nick').value.toLowerCase().trim();
        if(!myNick) return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-video').srcObject = localStream;
            document.getElementById('login').style.display = 'none';
            peer = new Peer('vrc-' + myNick);
            peer.on('open', () => {
                db.ref('users/' + myNick).set({status: 'online'});
                db.ref('users/' + myNick).onDisconnect().remove();
            });
            peer.on('call', call => {
                call.answer(localStream);
                setupChat(call.peer.replace('vrc-', ''));
                call.on('stream', stream => { document.getElementById('remote-video').srcObject = stream; });
            });
        } catch (e) { alert("Включите камеру!"); }
    }
    function checkFriendStatus() {
        const target = document.getElementById('target-nick').value.toLowerCase().trim();
        if(target.length > 2) {
            db.ref('users/' + target).on('value', (s) => {
                const d = s.val();
                document.getElementById('status-dot').className = (d && d.status === 'online') ? 'dot online' : 'dot';
            });
        }
    }
    function makeCall() {
        const target = document.getElementById('target-nick').value.toLowerCase().trim();
        if(!target) return;
        setupChat(target);
        const call = peer.call('vrc-' + target, localStream);
        call.on('stream', stream => { document.getElementById('remote-video').srcObject = stream; });
    }
    function setupChat(target) {
        if (activeChat === target) return;
        activeChat = target;
        const chatId = [myNick, target].sort().join('_');
        const chatRef = db.ref('chats/' + chatId);
        document.getElementById('chat-messages').innerHTML = '';
        chatRef.limitToLast(30).on('child_added', (snap) => {
            const d = snap.val();
            const c = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = d.sender === myNick ? 'msg mine' : 'msg';
            div.innerHTML = `<b>${d.sender}:</b> ${d.text}`;
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        });
        chatRef.on('value', (snap) => {
            if (snap.numChildren() > 30) {
                let count = 0;
                const updates = {};
                snap.forEach((child) => {
                    if (count < snap.numChildren() - 30) updates[child.key] = null;
                    count++;
                });
                chatRef.update(updates);
            }
        });
    }
    function sendText() {
        const txt = document.getElementById('text-msg').value.trim();
        const target = document.getElementById('target-nick').value.toLowerCase().trim() || activeChat;
        if(!txt || !target) return;
        const chatId = [myNick, target].sort().join('_');
        db.ref('chats/' + chatId).push({sender: myNick, text: txt, time: Date.now()});
        document.getElementById('text-msg').value = "";
    }
    function toggleMic(btn) {
        const t = localStream.getAudioTracks()[0];
        t.enabled = !t.enabled;
        btn.style.background = t.enabled ? 'rgba(255,255,255,0.1)' : 'var(--ios-red)';
    }
    function toggleCam(btn) {
        const t = localStream.getVideoTracks()[0];
        t.enabled = !t.enabled;
        btn.style.background = t.enabled ? 'rgba(255,255,255,0.1)' : 'var(--ios-red)';
    }
</script>
</body>
</html>
