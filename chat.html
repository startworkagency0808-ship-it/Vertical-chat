<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Vertical Pro | Live Cloud</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { --ios-blue: #007aff; --ios-green: #34c759; --ios-red: #ff3b30; --bg: #000; --glass: rgba(28, 28, 30, 0.85); --border: rgba(255, 255, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .main-screen { position: relative; width: 100%; height: 100vh; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { position: absolute; top: 60px; right: 20px; width: 110px; height: 160px; border-radius: 20px; border: 1px solid var(--border); object-fit: cover; z-index: 100; transform: scaleX(-1); background: #111; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dynamic-island { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; z-index: 110; }
        .search-box { background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); padding: 10px 15px; border-radius: 30px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .search-box input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; transition: 0.3s; }
        .dot.online { background: var(--ios-green); box-shadow: 0 0 10px var(--ios-green); }
        .bottom-nav { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 300px; display: flex; justify-content: space-between; background: var(--glass); backdrop-filter: blur(30px); padding: 15px 25px; border-radius: 40px; border: 1px solid var(--border); z-index: 120; }
        .btn-ios { width: 50px; height: 50px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: #fff; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn-ios:active { transform: scale(0.9); }
        .btn-call { background: var(--ios-green); width: 80px; border-radius: 25px; font-weight: bold; }
        .btn-hangup { background: var(--ios-red); }
        #login { position: fixed; inset: 0; background: #000; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .ios-input { width: 100%; max-width: 320px; background: #1c1c1e; border: 1px solid #333; padding: 18px; border-radius: 16px; color: #fff; font-size: 17px; margin-bottom: 20px; text-align: center; outline: none; }
    </style>
</head>
<body>

<div id="login">
    <div style="font-size: 50px; margin-bottom: 20px;">👤</div>
    <h1 style="margin-bottom: 10px;">Vertical ID</h1>
    <p style="opacity: 0.5; margin-bottom: 30px; font-size: 14px;">Введите ваш ник, чтобы войти в сеть</p>
    <input type="text" id="my-nick" class="ios-input" placeholder="Ваш никнейм">
    <button onclick="connectCloud()" class="ios-input" style="background:var(--ios-blue); border:none; font-weight:bold; cursor:pointer;">ВОЙТИ В СЕТЬ</button>
</div>

<div class="main-screen">
    <div class="dynamic-island">
        <div class="search-box">
            <div id="status-dot" class="dot"></div>
            <input type="text" id="target-nick" placeholder="Ник друга..." oninput="checkFriendStatus()">
            <button class="btn-ios btn-call" onclick="makeCall()"><i class="fa-solid fa-phone"></i></button>
        </div>
    </div>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>

    <div class="bottom-nav">
        <button class="btn-ios" onclick="toggleMic(this)"><i class="fa-solid fa-microphone"></i></button>
        <button class="btn-ios btn-hangup" onclick="location.reload()"><i class="fa-solid fa-phone-slash"></i></button>
        <button class="btn-ios" onclick="toggleCam(this)"><i class="fa-solid fa-video"></i></button>
    </div>
</div>

<script>
    // ТВОЙ КОНФИГУРАТОР FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBbHZH3dHhSQ_uslmBhxLC4HqBZHUBKl5g",
        authDomain: "verticalchat-69a8f.firebaseapp.com",
        databaseURL: "https://verticalchat-69a8f-default-rtdb.firebaseio.com",
        projectId: "verticalchat-69a8f",
        storageBucket: "verticalchat-69a8f.firebasestorage.app",
        messagingSenderId: "372527972623",
        appId: "1:372527972623:web:5eec4cfe62586637b37e7a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myNick = "";
    let localStream;
    let peer;

    async function connectCloud() {
        myNick = document.getElementById('my-nick').value.toLowerCase().trim();
        if(!myNick) return alert("Введите ник!");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-video').srcObject = localStream;
            document.getElementById('login').style.display = 'none';

            // Создаем Peer соединение
            peer = new Peer('vrc-' + myNick);

            peer.on('open', (id) => {
                db.ref('users/' + myNick).set({
                    status: 'online',
                    lastSeen: firebase.database.ServerValue.TIMESTAMP
                });
                db.ref('users/' + myNick).onDisconnect().set({
                    status: 'offline',
                    lastSeen: firebase.database.ServerValue.TIMESTAMP
                });
            });

            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', stream => {
                    document.getElementById('remote-video').srcObject = stream;
                });
            });

        } catch (e) {
            alert("Ошибка: Проверьте HTTPS и доступ к камере!");
        }
    }

    function checkFriendStatus() {
        const target = document.getElementById('target-nick').value.toLowerCase().trim();
        const dot = document.getElementById('status-dot');
        if(target.length > 2) {
            db.ref('users/' + target).on('value', (snapshot) => {
                const data = snapshot.val();
                dot.className = (data && data.status === 'online') ? 'dot online' : 'dot';
            });
        }
    }

    function makeCall() {
        const target = document.getElementById('target-nick').value.toLowerCase().trim();
        if(!target) return alert("Введите ник собеседника");

        const call = peer.call('vrc-' + target, localStream);
        call.on('stream', stream => {
            document.getElementById('remote-video').srcObject = stream;
        });
    }

    function toggleMic(btn) {
        const t = localStream.getAudioTracks()[0];
        t.enabled = !t.enabled;
        btn.style.color = t.enabled ? '#fff' : 'var(--ios-red)';
    }

    function toggleCam(btn) {
        const t = localStream.getVideoTracks()[0];
        t.enabled = !t.enabled;
        btn.style.color = t.enabled ? '#fff' : 'var(--ios-red)';
    }
</script>

</body>
</html>
